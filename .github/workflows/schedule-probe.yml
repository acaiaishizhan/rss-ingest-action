name: schedule-probe

permissions: {}

on:
  workflow_dispatch:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record scheduler delivery
        shell: bash
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          date -u +"delivered_at=%Y-%m-%dT%H:%M:%SZ"

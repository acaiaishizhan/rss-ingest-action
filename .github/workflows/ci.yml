name: tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt pytest
      - name: Run tests without local environment
        env:
          RSS_INGEST_SKIP_LOCAL_ENV: "true"
        run: python -m pytest -q
